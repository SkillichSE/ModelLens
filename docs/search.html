<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — ModelLens</title>
  <meta name="description" content="Search and compare free AI models by name, provider, speed or quality.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo"><span class="logo-icon">🔍</span><span>ModelLens</span></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Rankings</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="search.html" class="nav-link active">Search</a>
        <a href="trends.html" class="nav-link">Trends</a>
        <a href="news.html" class="nav-link">News</a>
      </nav>
      <div class="theme-switch-wrap">
        <span class="theme-switch-label" id="theme-label">Dark</span>
        <label class="theme-switch" aria-label="Toggle theme">
          <input type="checkbox" id="theme-toggle">
          <span class="theme-switch-track"></span>
          <span class="theme-switch-thumb" id="thumb-icon">🌙</span>
        </label>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="section-header" style="margin-bottom:var(--sp-lg);">
      <h1 class="section-title" style="font-size:28px;">Search models</h1>
    </div>

    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search-input" placeholder="Llama, Gemini, Mistral...">
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <div>
          <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--md-on-surface-low);margin-bottom:8px;">Provider</div>
          <div class="filters" id="provider-filters">
            <button class="filter-btn active" data-provider="all">All</button>
            <button class="filter-btn" data-provider="Groq">Groq</button>
            <button class="filter-btn" data-provider="Google">Google</button>
            <button class="filter-btn" data-provider="OpenRouter">OpenRouter</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--md-on-surface-low);margin-bottom:8px;">Sort by</div>
          <div class="filters" id="sort-filters">
            <button class="filter-btn active" data-sort="quality">Quality</button>
            <button class="filter-btn" data-sort="speed">Speed</button>
            <button class="filter-btn" data-sort="code">Code</button>
          </div>
        </div>
      </div>
    </div>

    <div id="results-count" style="font-size:13px;color:var(--md-on-surface-low);margin-bottom:16px;"></div>
    <div class="grid grid-2" id="search-results"></div>
    <div id="no-results" style="display:none;text-align:center;padding:64px;color:var(--md-on-surface-var);">
      No models match your search.
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/SkillichSE/ModelLens" class="footer-link">GitHub</a>
      <a href="about.html" class="footer-link">About</a>
      <a href="news.html" class="footer-link">News</a>
    </div>
    <p>Free AI models, tested daily</p>
  </footer>

  <script>
    let allModels=[], currentProvider='all', currentSort='quality', searchQuery='';

    function sizeBadge(cat){
      const m={small:'size-small',medium:'size-medium',large:'size-large',unknown:'size-unknown'};
      const l={small:'small',medium:'medium',large:'large',unknown:'?'};
      return `<span class="size-badge ${m[cat]||'size-unknown'}">${l[cat]||cat}</span>`;
    }

    function scoreLine(label,val,cls){
      return `<div class="score-line">
        <span class="score-line-label">${label}</span>
        <span class="score-line-bar"><span class="score-line-fill ${cls}" style="width:${val}%"></span></span>
        <span class="score-line-val">${Math.round(val)}</span>
      </div>`;
    }

    async function loadData(){
      try{
        const today=new Date().toISOString().split('T')[0];
        let data;
        const todayR=await fetch(`data/results/${today}.json`);
        if(todayR.ok){
          const arr=await todayR.json();
          data={results:arr};
        } else {
          const r=await fetch('data/results/latest.json');
          data=await r.json();
        }
        allModels=(data.results||[]).map(m=>({
          ...m,
          quality_score: m.quality_score??m.overall_score??0,
          raw_speed: m.raw_speed??m.tests?.speed?.avg_tokens_per_sec??0,
          size_category: m.size_category??'unknown',
        })).filter(m=>m.quality_score>0||m.raw_speed>0);
        filterAndDisplay();
      }catch(e){console.error(e);}
    }

    function filterAndDisplay(){
      let list=currentProvider==='all'?[...allModels]:allModels.filter(m=>m.provider===currentProvider);
      if(searchQuery) list=list.filter(m=>
        m.model_name.toLowerCase().includes(searchQuery)||
        m.provider.toLowerCase().includes(searchQuery)
      );
      list.sort((a,b)=>{
        if(currentSort==='speed') return (b.raw_speed||0)-(a.raw_speed||0);
        if(currentSort==='code')  return (b.tests?.code?.avg_score||0)-(a.tests?.code?.avg_score||0);
        return (b.quality_score||0)-(a.quality_score||0);
      });

      const rc=document.getElementById('results-count');
      const nr=document.getElementById('no-results');
      const sr=document.getElementById('search-results');

      if(!list.length){
        sr.innerHTML=''; sr.style.display='none';
        nr.style.display='block';
        rc.textContent='';
        return;
      }
      nr.style.display='none';
      sr.style.display='grid';
      rc.textContent=`${list.length} model${list.length!==1?'s':''} found`;

      sr.innerHTML=list.map((m,i)=>{
        const q=m.quality_score||0;
        const c=m.tests?.code?.avg_score||0;
        const rs=m.tests?.reasoning?.score||0;
        const spd=m.raw_speed||0;
        return `<div class="model-card">
          <div class="model-header">
            <div>
              <div class="model-name">${m.model_name}${sizeBadge(m.size_category)}</div>
              <div class="model-provider">${m.provider} · ${m.size}</div>
            </div>
            <div class="rank-badge">#${i+1}</div>
          </div>
          <div class="score-row">
            ${scoreLine('Quality',q,'fill-quality')}
            ${scoreLine('Code',c,'fill-code')}
            ${scoreLine('Reasoning',rs,'fill-reasoning')}
          </div>
          <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--md-outline-var);">
            <span style="font-size:12px;color:var(--md-on-surface-low);">${Math.round(spd)} tok/s</span>
            <span style="font-size:18px;font-weight:700;color:var(--md-primary);">${Math.round(q)}<span style="font-size:11px;font-weight:400;color:var(--md-on-surface-low);">/100</span></span>
          </div>
        </div>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded',()=>{
      loadData();
      document.getElementById('search-input').addEventListener('input',e=>{searchQuery=e.target.value.toLowerCase();filterAndDisplay();});
      document.getElementById('provider-filters').addEventListener('click',e=>{
        if(!e.target.classList.contains('filter-btn'))return;
        document.querySelectorAll('#provider-filters .filter-btn').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        currentProvider=e.target.dataset.provider;
        filterAndDisplay();
      });
      document.getElementById('sort-filters').addEventListener('click',e=>{
        if(!e.target.classList.contains('filter-btn'))return;
        document.querySelectorAll('#sort-filters .filter-btn').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        currentSort=e.target.dataset.sort;
        filterAndDisplay();
      });
    });
  </script>
  <script>
    (function(){
      var themeToggle = document.getElementById('theme-toggle');
      var themeLabel  = document.getElementById('theme-label');
      var thumbIcon   = document.getElementById('thumb-icon');
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        var dark = t === 'dark';
        themeToggle.checked = dark;
        themeLabel.textContent = dark ? 'Dark' : 'Light';
        thumbIcon.textContent  = dark ? '🌙' : '☀️';
      }
      applyTheme(localStorage.getItem('theme') || 'dark');
      themeToggle.addEventListener('change', function() { applyTheme(themeToggle.checked ? 'dark' : 'light'); });
      window.addEventListener('scroll',function(){document.querySelector('.header').classList.toggle('scrolled',window.scrollY>0);});
    })();
  </script>
</body>
</html>
