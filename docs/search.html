<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Models - AI Benchmarker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚡</span>
        <span>AI Benchmarker</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html" class="nav-link active">Search</a>
        <a href="news.html" class="nav-link">News</a>
        <a href="trends.html" class="nav-link">Trends</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🔍 Search AI Models</h1>
    <p style="color: var(--text-secondary); margin-bottom: 32px;">
      Find and compare models by name, provider, or performance
    </p>

    <!-- Search & Filters -->
    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          class="search-input" 
          id="search-input"
          placeholder="Search by model name (e.g., Llama, Gemini, Mixtral...)"
        >
      </div>

      <div style="margin-bottom: 16px;">
        <strong style="font-size: 0.875rem; color: var(--text-secondary);">PROVIDER</strong>
        <div class="filters" id="provider-filters" style="margin-top: 8px;">
          <button class="filter-btn active" data-provider="all">All</button>
          <button class="filter-btn" data-provider="Groq">Groq</button>
          <button class="filter-btn" data-provider="Google">Google</button>
          <button class="filter-btn" data-provider="Together">Together AI</button>
        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <strong style="font-size: 0.875rem; color: var(--text-secondary);">SORT BY</strong>
        <div class="filters" id="sort-filters" style="margin-top: 8px;">
          <button class="filter-btn active" data-sort="overall">Overall Score</button>
          <button class="filter-btn" data-sort="speed">Speed</button>
          <button class="filter-btn" data-sort="code">Code Quality</button>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results-count" style="margin-bottom: 16px; color: var(--text-secondary);"></div>
    <div class="grid grid-2" id="search-results">
      <!-- Populated by JS -->
    </div>

    <!-- No results message -->
    <div id="no-results" style="display: none; text-align: center; padding: 48px;">
      <div style="font-size: 3rem; margin-bottom: 16px;">🔍</div>
      <h3>No models found</h3>
      <p style="color: var(--text-secondary); margin-top: 8px;">
        Try adjusting your filters or search query
      </p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/yourusername/ai-benchmarker" class="footer-link">GitHub</a>
      <a href="#" class="footer-link">API Docs</a>
      <a href="#" class="footer-link">About</a>
    </div>
    <p>Open source project • Updated daily</p>
  </footer>

  <script>
    let allModels = [];
    let filteredModels = [];
    let currentProvider = 'all';
    let currentSort = 'overall';
    let searchQuery = '';

    // Load data
    async function loadData() {
      try {
        const response = await fetch('data/results/latest.json');
        const data = await response.json();
        allModels = data.results;
        filterAndDisplay();
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    // Filter and sort models
    function filterAndDisplay() {
      // Filter by provider
      filteredModels = currentProvider === 'all' 
        ? [...allModels]
        : allModels.filter(m => m.provider === currentProvider);

      // Filter by search query
      if (searchQuery) {
        filteredModels = filteredModels.filter(m => 
          m.model_name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          m.provider.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }

      // Sort
      filteredModels.sort((a, b) => {
        if (currentSort === 'speed') {
          return (b.tests.speed?.avg_tokens_per_sec || 0) - (a.tests.speed?.avg_tokens_per_sec || 0);
        } else if (currentSort === 'code') {
          return (b.tests.code?.avg_score || 0) - (a.tests.code?.avg_score || 0);
        } else {
          return b.overall_score - a.overall_score;
        }
      });

      displayResults();
    }

    // Display results
    function displayResults() {
      const resultsContainer = document.getElementById('search-results');
      const resultsCount = document.getElementById('results-count');
      const noResults = document.getElementById('no-results');

      if (filteredModels.length === 0) {
        resultsContainer.style.display = 'none';
        noResults.style.display = 'block';
        resultsCount.textContent = '';
        return;
      }

      resultsContainer.style.display = 'grid';
      noResults.style.display = 'none';
      resultsCount.textContent = `${filteredModels.length} model${filteredModels.length !== 1 ? 's' : ''} found`;

      resultsContainer.innerHTML = filteredModels.map((model, index) => {
        const speedScore = model.tests.speed?.avg_tokens_per_sec || 0;
        const codeScore = model.tests.code?.avg_score || 0;
        const providerColor = {
          'Groq': 'chip-blue',
          'Google': 'chip-green',
          'Together': 'chip-yellow'
        }[model.provider] || 'chip-gray';

        return `
          <div class="model-card">
            <div class="model-header">
              <div>
                <div class="model-name">${model.model_name}</div>
                <div style="margin-top: 8px;">
                  <span class="chip ${providerColor}">${model.provider}</span>
                  <span class="chip chip-gray">${model.size}</span>
                </div>
              </div>
              <div class="model-rank">#${index + 1}</div>
            </div>
            
            <div class="model-metrics">
              <div class="metric">
                <span class="metric-label">Speed</span>
                <span class="metric-value">${Math.round(speedScore)}</span>
                <span style="font-size: 0.75rem; color: var(--text-tertiary);">tokens/sec</span>
              </div>
              <div class="metric">
                <span class="metric-label">Code Quality</span>
                <span class="metric-value">${Math.round(codeScore)}%</span>
              </div>
            </div>
            
            <div style="margin-top: 16px;">
              <div class="metric-label">Overall Performance</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${model.overall_score}%"></div>
              </div>
              <div style="text-align: right; font-size: 0.875rem; color: var(--text-secondary); margin-top: 4px;">
                ${Math.round(model.overall_score)}/100
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
      loadData();

      // Search input
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        filterAndDisplay();
      });

      // Provider filters
      document.getElementById('provider-filters').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          document.querySelectorAll('#provider-filters .filter-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          e.target.classList.add('active');
          currentProvider = e.target.dataset.provider;
          filterAndDisplay();
        }
      });

      // Sort filters
      document.getElementById('sort-filters').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          document.querySelectorAll('#sort-filters .filter-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          e.target.classList.add('active');
          currentSort = e.target.dataset.sort;
          filterAndDisplay();
        }
      });
    });
  </script>
</body>
</html>
