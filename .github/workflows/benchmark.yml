name: Daily AI Benchmark

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC каждый день
  workflow_dispatch:       # ручной запуск

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Стандартный таймаут GitHub Actions — 360 мин, но Google 429 может раздуть
    # до 70 мин. Ставим явный лимит чтобы не висеть вечно при проблемах.
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'          # кэшируем зависимости между запусками

      - name: 📦 Install dependencies
        run: pip install requests feedparser

      # ── Groq + OpenRouter (быстрые, без лимитов) ──────────────────────────
      - name: ⚡ Benchmark — Groq & OpenRouter
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd src
          python benchmark.py --providers groq,openrouter

      # ── Google (отдельный шаг с retry и увеличенным таймаутом) ─────────────
      # Если GOOGLE_API_KEY не выставлен в Secrets — шаг пропускается,
      # не падает и не тормозит весь workflow.
      - name: 🔵 Benchmark — Google
        if: ${{ secrets.GOOGLE_API_KEY != '' }}
        continue-on-error: true        # Google 429 не роняет весь workflow
        timeout-minutes: 60            # Google worst-case ~56 мин, даём запас
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd src
          python benchmark.py --providers google --merge

      # ── Новости ────────────────────────────────────────────────────────────
      - name: 📰 Fetch news
        continue-on-error: true        # не роняем workflow если парсер упал
        run: |
          cd src
          python news_parser.py

      # ── Commit ────────────────────────────────────────────────────────────
      - name: 💾 Commit results
        run: |
          git config user.name  "Benchmark Bot"
          git config user.email "bot@benchmark.ai"
          git add docs/data/results/ || true
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "📊 Benchmark results — $(date +'%Y-%m-%d')"
            git push
            echo "✅ Pushed"
          fi
