name: AI Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests feedparser

      - name: Groq llama-3.1-8b
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-3.1-8b

      - name: Groq llama-3.3-70b
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models llama-3.3-70b --merge

      - name: Groq mixtral
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq --models mixtral-8x7b --merge

      - name: OR llama-3.2-1b
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models llama-3.2-1b

      - name: OR llama-3.2-3b
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models llama-3.2-3b --merge

      - name: OR llama-3.1-8b
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models llama-3.1-8b --merge

      - name: OR qwen-2.5-7b
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models qwen-2.5-7b --merge

      - name: OR qwen coder
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models qwen-2.5-coder-7b --merge

      - name: OR mistral nemo
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models mistral-nemo --merge

      - name: OR phi-3-mini
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models phi-3-mini --merge

      - name: OR deepseek chat
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models deepseek-chat --merge

      - name: OR deepseek coder
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cd src && python benchmark.py --providers openrouter --models deepseek-coder --merge

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@ai"
          git add .
          git commit -m "update" || echo "no changes"
          git push
